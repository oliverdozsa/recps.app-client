<div class="card image-full bg-base-100 w-65 h-17 overflow-hidden"
     [class.ring-4]="selected"
     [class.ring-primary]="selected">
  <figure>
    <a [href]="recipe.url" target="_blank">
      @if (recipe.imageUrl && !imageError()) {
        <img [src]="recipe.imageUrl" [alt]="recipe.name" class="my-2 rounded w-full object-cover h-20"
             (error)="imageError.set(true)"/>
      } @else {
        <div class="my-2 rounded w-full object-cover h-40 flex justify-center items-center">
          <div>
            <span class="icon-[tabler--bowl-spoon] size-20 text-neutral-500"></span>
          </div>
        </div>
      }
    </a>
  </figure>

  <div class="card-body px-3 py-1.5 gap-0.5">
    <div class="flex items-center min-w-0 max-w-59">
      <div class="font-semibold text-sm grow min-w-0 block truncate cursor-default">{{ recipe.name }}</div>
      <div>
        <a [href]="recipe.url" target="_blank" class="link link-primary flex item-center">
          <div class="icon-[tabler--external-link] size-5"></div>
        </a>
      </div>
      @if (editMode) {
        <div>
          <button class="btn btn-circle btn-soft btn-xs btn-primary ms-1"
                  (click)="$event.stopPropagation(); onBackClick.emit()">
            <span class="icon-[tabler--arrow-back-up] size-4"></span>
          </button>
        </div>
      }
      @if (deleteMode) {
        <div>
          <button class="btn btn-circle btn-soft btn-xs btn-error ms-1"
                  (click)="$event.stopPropagation(); onDeleteClicked.emit()">
            <span class="icon-[tabler--trash] size-4"></span>
          </button>
        </div>
      }
    </div>

    @if (recipe.cookingTime) {
      <div class="text-xs text-white cursor-default">{{ recipe.cookingTime }} {{ "recipeCard.mins" | translate }}</div>
    }

    <div class="text-xs text-white p-0 cursor-default">
      {{ recipe.sourcePage }}
    </div>
  </div>


</div>
