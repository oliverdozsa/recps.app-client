<div class="flex flex-wrap gap-4 justify-center mb-10">
  @for (recipe of recipes(); track recipe.id) {
    <app-recipe-card [recipe]="recipe"></app-recipe-card>
  }
</div>
@if (recipes().length == 0) {
  <div>no results</div>
  @if (areConflictingIngredientsPresent) {
    <div>conflicting ingredients!</div>
  }
}
