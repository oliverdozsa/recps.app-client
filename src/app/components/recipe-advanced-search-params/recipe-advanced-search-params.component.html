<div class="card p-4 h-fit w-72">
  <h3 class="text-lg font-semibold mb-3">{{ "recipeAdvancedSearchParams.title" | translate }}</h3>
  <div class="space-y-3">

    <div>
      <label class="label text-sm">{{ "recipeAdvancedSearchParams.prepTime" | translate }}</label>
      <app-dual-range [min]="0" [max]="120" [step]="5"
                      [initialMinValue]="prepTimeMin" [initialMaxValue]="prepTimeMax"
                      (minValueChange)="setPrepTimeMin($event)"
                      (maxValueChange)="setPrepTimeMax($event)"/>
    </div>

    <div>
      <label class="label text-sm">{{ "recipeAdvancedSearchParams.countIngredients" | translate }}</label>
      <app-dual-range [min]="0" [max]="25" [step]="1"
                      [initialMinValue]="countIngredientsMin" [initialMaxValue]="countIngredientsMax"
                      (minValueChange)="setCountIngredientsMin($event)"
                      (maxValueChange)="setCountIngredientsMax($event)"/>
    </div>

    <div>
      <label class="label text-sm">{{ "recipeAdvancedSearchParams.orderBy" | translate }}</label>
      <select class="select select-sm w-full" [ngModel]="orderBy" (ngModelChange)="orderByChange($event)">
        <option value="">{{ "recipeAdvancedSearchParams.orderByNone" | translate }}</option>
        <option value="prepTime">{{ "recipeAdvancedSearchParams.orderByPrepTime" | translate }}</option>
        <option value="ingredientCount">{{ "recipeAdvancedSearchParams.orderByIngredientCount" | translate }}</option>
      </select>

      @if (orderBy) {
        <div class="join mt-2 w-full">
          <button class="join-item btn btn-sm flex-1"
                  [class.btn-primary]="orderDirection === 'asc'"
                  (click)="setDirection('asc')">
            <span class="icon-[tabler--sort-ascending] size-4"></span>
            {{ "recipeAdvancedSearchParams.orderAsc" | translate }}
          </button>
          <button class="join-item btn btn-sm flex-1"
                  [class.btn-primary]="orderDirection === 'desc'"
                  (click)="setDirection('desc')">
            <span class="icon-[tabler--sort-descending] size-4"></span>
            {{ "recipeAdvancedSearchParams.orderDesc" | translate }}
          </button>
        </div>
      }
    </div>

    @if (recipeService.sourcePages().length > 0) {
      <div>
        <label class="label text-sm">{{ "recipeAdvancedSearchParams.sourcePages" | translate }}</label>
        <div class="space-y-1">
          @for (group of sourcePageGroups(); track group.languageId) {
            <div>
              <button type="button"
                      class="flex w-full items-center justify-between rounded px-1 py-0.5 text-sm font-medium hover:bg-base-200"
                      (click)="toggleGroup(group.languageId)">
                <div class="flex items-center gap-1.5">
                  <span class="icon-[tabler--chevron-right] size-3.5 transition-transform duration-150"
                        [class.rotate-90]="isGroupExpanded(group.languageId)"></span>
                  <span>{{ group.languageName }}</span>
                </div>
                @if (selectedCountInGroup(group.languageId) > 0) {
                  <span class="badge badge-primary badge-sm">{{ selectedCountInGroup(group.languageId) }}</span>
                }
              </button>
              @if (isGroupExpanded(group.languageId)) {
                <div class="ml-3 mt-0.5 space-y-0.5">
                  @for (page of group.pages; track page.id) {
                    <label class="flex cursor-pointer items-center gap-2 rounded px-1 py-0.5 hover:bg-base-200">
                      <input type="checkbox" class="checkbox checkbox-xs"
                             [checked]="isSourcePageSelected(page.id)"
                             (change)="toggleSourcePage(page.id, $event)" />
                      <span class="text-sm">{{ page.name }}</span>
                    </label>
                  }
                </div>
              }
            </div>
          }
        </div>
      </div>
    }

  </div>
</div>
