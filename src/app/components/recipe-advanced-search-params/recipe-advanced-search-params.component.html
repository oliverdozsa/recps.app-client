<div class="card p-4 h-fit w-72">
  <h3 class="text-lg font-semibold mb-3">{{ "recipeAdvancedSearchParams.title" | translate }}</h3>
  <div class="space-y-3">

    <div>
      <label class="label text-sm">{{ "recipeAdvancedSearchParams.prepTime" | translate }}</label>
      <div class="flex gap-2">
        <label class="input input-sm flex items-center gap-1 flex-1">
          <span class="text-xs opacity-60">{{ "recipeAdvancedSearchParams.min" | translate }}</span>
          <input type="number" class="w-full" min="0" [ngModel]="prepTimeMin"
                 (ngModelChange)="setPrepTimeMin($event?.toString() ?? '')"/>
        </label>
        <label class="input input-sm flex items-center gap-1 flex-1">
          <span class="text-xs opacity-60">{{ "recipeAdvancedSearchParams.max" | translate }}</span>
          <input type="number" class="w-full" min="0" [ngModel]="prepTimeMax"
                 (ngModelChange)="setPrepTimeMax($event?.toString() ?? '')"/>
        </label>
      </div>
    </div>

    <div>
      <label class="label text-sm">{{ "recipeAdvancedSearchParams.countIngredients" | translate }}</label>
      <div class="flex gap-2">
        <label class="input input-sm flex items-center gap-1 flex-1">
          <span class="text-xs opacity-60">{{ "recipeAdvancedSearchParams.min" | translate }}</span>
          <input type="number" class="w-full" min="0" [ngModel]="countIngredientsMin"
                 (ngModelChange)="setCountIngredientsMin($event?.toString() ?? '')"/>
        </label>
        <label class="input input-sm flex items-center gap-1 flex-1">
          <span class="text-xs opacity-60">{{ "recipeAdvancedSearchParams.max" | translate }}</span>
          <input type="number" class="w-full" min="0" [ngModel]="countIngredientsMax"
                 (ngModelChange)="setCountIngredientsMax($event?.toString() ?? '')"/>
        </label>
      </div>
    </div>

    <div>
      <label class="label text-sm">{{ "recipeAdvancedSearchParams.orderBy" | translate }}</label>
      <select class="select select-sm w-full" [ngModel]="orderBy" (ngModelChange)="orderByChange($event)">
        <option value="">{{ "recipeAdvancedSearchParams.orderByNone" | translate }}</option>
        <option value="prepTime">{{ "recipeAdvancedSearchParams.orderByPrepTime" | translate }}</option>
        <option value="ingredientCount">{{ "recipeAdvancedSearchParams.orderByIngredientCount" | translate }}</option>
      </select>

      @if (orderBy) {
        <div class="join mt-2 w-full">
          <button class="join-item btn btn-sm flex-1"
                  [class.btn-primary]="orderDirection === 'asc'"
                  (click)="setDirection('asc')">
            <span class="icon-[tabler--sort-ascending] size-4"></span>
            {{ "recipeAdvancedSearchParams.orderAsc" | translate }}
          </button>
          <button class="join-item btn btn-sm flex-1"
                  [class.btn-primary]="orderDirection === 'desc'"
                  (click)="setDirection('desc')">
            <span class="icon-[tabler--sort-descending] size-4"></span>
            {{ "recipeAdvancedSearchParams.orderDesc" | translate }}
          </button>
        </div>
      }
    </div>

  </div>
</div>
