<h2 class="text-lg font-semibold">{{"recipeMainSearchParams.searchByName" | translate}}</h2>
<input type="text" class="input w-full mb-3" aria-label="input" [placeholder]="'recipeMainSearchParams.searchByNamePlaceholder' | translate"
       [value]="filterByName" (input)="filterByNameRawChange($any($event.target).value)" />

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-3">
  <div class="md:col-span-2">
    <h2 class="text-lg font-semibold">{{"recipeMainSearchParams.byIngredients" | translate}}</h2>
    <app-ingredients-input [initialIngredients]="includedIngredients"
                           (selectedIngredientsChange)="includedIngredientsChange($event)"></app-ingredients-input>
  </div>

  <div class="md:col-span-1">
    <h2 class="text-lg font-semibold">{{"recipeMainSearchParams.excluded" | translate}}</h2>
    <app-ingredients-input badgeClass="badge-warning" [initialIngredients]="excludedIngredients"
                           (selectedIngredientsChange)="excludedIngredientsChange($event)"></app-ingredients-input>
  </div>
</div>
