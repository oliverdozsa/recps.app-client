<div class="relative">
  <!-- Input container -->
  <div
    class="flex flex-wrap items-center gap-1.5 min-h-10 h-auto px-3 py-1.5 rounded-lg border border-base-content/40 bg-base-100 cursor-text focus-within:border-primary focus-within:outline focus-within:outline-primary transition-colors"
    (click)="focusInput()"
  >
    <!-- Tags -->
    @for (tag of tags; track $index) {
      <div class="badge badge-primary gap-1 select-none"
      >
        {{ displayFunction(tag) }}
        <button
          type="button"
          class="cursor-pointer hover:opacity-70 transition-opacity flex items-center"
          (click)="removeTag(tag); $event.stopPropagation()"
          [attr.aria-label]="'Remove ' + tag"
        >
          <span class="icon-[tabler--x] size-3"></span>
        </button>
      </div>
    }

    <!-- Text input -->
    <input
      #tagInput
      type="text"
      class="outline-none bg-transparent flex-1 min-w-24 text-sm text-base-content placeholder:text-base-content/40"
      [placeholder]="tags.length === 0 ? placeholder : ''"
      [(ngModel)]="inputValue"
      (input)="onInput()"
      (blur)="onBlur()"
      (keydown)="onKeydown($event)"
      autocomplete="off"
    />
  </div>

  <!-- Dropdown -->
  @if (showDropdown && filteredOptions.length > 0) {
    <ul class="absolute z-50 mt-1 w-full bg-base-100 border border-base-content/15 rounded-box shadow-lg max-h-60 overflow-y-auto py-1"
        role="listbox"
    >
      @for (option of filteredOptions; track $index; let i = $index) {
        <li
          role="option"
          [attr.aria-selected]="i === activeIndex"
        >
          <button
            type="button"
            class="w-full text-left px-3 py-2 text-sm transition-colors"
            [class.bg-base-200]="i === activeIndex"
            [class.hover:bg-base-200]="i !== activeIndex"
            (mousedown)="addTag(option)"
          >
            {{ displayFunction(option) }}
          </button>
        </li>
      }
    </ul>
  }

</div>
