@if (!authService.isLoggedIn) {
  <div class="flex flex-col items-center justify-center mt-20 gap-4">
    <p class="text-lg">You need to be logged in to view your menus.</p>
  </div>
} @else {
  @if (loading()) {
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-base-100/60">
      <span class="loading loading-spinner loading-xl"></span>
    </div>
  }

  <div class="max-w-2xl mx-auto mt-10 px-4">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold">My Menus</h1>
      <button class="btn btn-primary" (click)="navigateToCreate()">New Menu</button>
    </div>

    @if (menus().length === 0 && !loading()) {
      <p class="text-base-content/60">No menus yet. Create one to get started.</p>
    } @else {
      <ul class="flex flex-col gap-2">
        @for (menu of menus(); track menu.id) {
          <li>
            <a [routerLink]="['/menu', menu.id]" class="flex items-center justify-between p-4 rounded-lg border border-base-300 hover:bg-base-200 transition-colors cursor-pointer">
              <span class="font-medium">{{ menu.name }}</span>
              <span class="text-base-content/40">›</span>
            </a>
          </li>
        }
      </ul>
    }
  </div>
}
